[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "shopping-assistant"
version = "0.1.0"
description = ""
authors = [{ name = "Abhishek Bhatia", email = "bhatiaabhishek8893@gmail.com" }]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "python-dotenv", "langgraph", 
    "openai-agents", "openai", 
    "langchain", "langchain_community",
    "weaviate-client",
    "gradio"
]

# [project.optional-dependencies]
# dev = ["ipykernel", "jupyter notebook", "gradio"]

[tool.setuptools.packages.find]
where = ["."]
include = ["shopping_assistant*"]


# TODO: Remove from here and put into a separate ruff.toml (until I refactor this package to a separate packages/ folder)
# Ruff #############################################################################################
[tool.ruff]
exclude = [
    ".eggs",
    ".git",
    ".git-rewrite",
    ".mypy_cache",
    ".pytype",
    ".ruff_cache",
    "__pypackages__",
    "_build",
    "build",
    "dist",
    "tools",
    ".github",

    # Tests (# TODO: Revisit)
    "test_*.py",
    "conftest.py",
]
target-version = "py312"
indent-width = 4

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint.per-file-ignores]
"__init__.py" = [ "F401" ]

# Ruff #############################################################################################

# Ruff Lint
[tool.ruff.lint]

# TODO: Add a custom list later
# select = []
# ignore = []

fixable = [
    "ALL", # Allow fix for all enabled rules (when `--fix`) is provided.
]
unfixable = [  ]
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$" # Allow unused variables when underscore-prefixed.

# Ruff Lint: Pycodestyle ###############################################################################
[tool.ruff.lint.pycodestyle]
max-doc-length = 88
max-line-length = 88

# Ruff plugins #####################################################################################
[tool.ruff.lint.mccabe]
max-complexity = 10 # Unlike Flake8, default to a complexity level of 10.

[tool.ruff.lint.pydocstyle]
convention = "google"