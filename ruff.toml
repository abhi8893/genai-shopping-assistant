exclude = [
    ".eggs",
    ".git",
    ".git-rewrite",
    ".mypy_cache",
    ".pytype",
    ".ruff_cache",
    "__pypackages__",
    "_build",
    "build",
    "dist",
    "tools",
    ".github",

    # Tests (# TODO: Revisit)
    "test_*.py",
    "conftest.py",
]
target-version = "py312"
indent-width = 4

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[lint.per-file-ignores]
"__init__.py" = [ "F401" ]

[lint]

# TODO: Add a custom list later
# select = []
# ignore = []

fixable = [
    "ALL", # Allow fix for all enabled rules (when `--fix`) is provided.
]
unfixable = [  ]
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$" # Allow unused variables when underscore-prefixed.

[lint.pycodestyle]
max-doc-length = 88
max-line-length = 88

[lint.mccabe]
max-complexity = 10

[lint.pydocstyle]
convention = "google"