default_language_version: 
  python: "3.12"


repos:  
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: "v0.14.6"
    hooks:
      - id: ruff
        name: ruff
        types: [python]
        args: [--fix, --config, pyproject.toml]

      - id: ruff-format
        name: ruff-format
        types: [python]
        args: [--config, pyproject.toml]

      

      