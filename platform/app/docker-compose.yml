services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.34.0
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    
    ports:
      - "${WEAVIATE_HTTP_PORT}:8080"
      - "${WEAVIATE_GRPC_PORT}:50051"
    
    volumes:
      - weaviate_data:/var/lib/weaviate
    
    restart: on-failure:0

    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      ENABLE_MODULES: 'text2vec-ollama,generative-ollama'
      CLUSTER_HOSTNAME: 'node1'
      OLLAMA_API_ENDPOINT: 'http://ollama:11434'

  ollama:
    image: ollama/ollama:0.12.9
    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - ~/.ollama:/root/.ollama

  shopping-assistant:
    build:
      context: ${REPO_ROOT}
      dockerfile: services/shopping-assistant/Dockerfile
      target: prod
    image: shopping-assistant:prod
    ports:
      - "${SHOPPING_ASSISTANT_PORT}:8010"
    environment:
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      WEAVIATE_HTTP_HOST: ${WEAVIATE_HTTP_HOST}
      WEAVIATE_HTTP_PORT: ${WEAVIATE_HTTP_PORT}
      WEAVIATE_HTTP_SECURE: false
      WEAVIATE_GRPC_HOST: ${WEAVIATE_GRPC_HOST}
      WEAVIATE_GRPC_PORT: ${WEAVIATE_GRPC_PORT}
      WEAVIATE_GRPC_SECURE: false
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL}

      # Accessing the ECOM API running on host machine from the chatbot container
      ECOM_API_BASE_URL: 'http://ecom-backend:${ECOM_API_PORT}/api/v1'

  ecom-backend:
    build:
      context: ${REPO_ROOT}
      dockerfile: services/ecom-backend/Dockerfile
      target: prod
    image: ecom-backend:prod
    ports:
      - "${ECOM_API_PORT}:8000"      

volumes:
  weaviate_data:

