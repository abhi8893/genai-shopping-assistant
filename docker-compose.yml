services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.34.0
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    
    ports:
      - 8080:8080
      - 50051:50051
    
    volumes:
      - weaviate_data:/var/lib/weaviate
    
    restart: on-failure:0

    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      ENABLE_MODULES: 'text2vec-ollama,generative-ollama'
      CLUSTER_HOSTNAME: 'node1'
      OLLAMA_API_ENDPOINT: 'http://ollama:11434'

  ollama:
    image: ollama/ollama:0.12.9
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  chatbot:
    image: shopping_assistant_chatbot:latest
    ports:
      - "8010:8010"
    environment:
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      WEAVIATE_HTTP_HOST: weaviate
      WEAVIATE_HTTP_PORT: 8080
      WEAVIATE_HTTP_SECURE: false
      WEAVIATE_GRPC_HOST: weaviate
      WEAVIATE_GRPC_PORT: 50051
      WEAVIATE_GRPC_SECURE: false

      # Accessing the ECOM API running on host machine from the chatbot container
      ECOM_API_BASE_URL: http://host.docker.internal:8000/api/v1


volumes:
  weaviate_data:
  ollama_data:

